{% macro entry(doc) %}
    <article class="entry">
        <div class="top">
            <div class="title">
                <a href=" {{ url_for('read.get_treebank', slug=doc.slug) }}">
                    <h3>{{ doc.title }}</h3>
                    &nbsp;&nbsp;/&nbsp;&nbsp;
                    <span class="original-title">{{ doc.original_title }}</span>
                </a>
            </div>
            <div hidden class="completeness">
                {% if doc.span %}{{ doc.span }}{% endif %}
            </div>
            <div class="genre">{{ doc.genre }}</div>
        </div>
        {% if doc.chunks %}
            <div class="chunks">
                {% for chunk in doc.chunks %}
                    <a href="{{ url_for('read.get_chunk', slug=doc.slug, chunk=chunk) }}">{{ chunk }}</a>
                {% endfor %}
            </div>
        {% endif %}
    </article>
{% endmacro %}
